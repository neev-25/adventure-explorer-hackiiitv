<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Trips - Adventure Explorer</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body data-page="trips">
    <div id="site-nav"></div>

    <!-- Snow Treks -->
    <section class="trips-section">
        <div class="container">
            <h2>Snow Treks</h2>
            <div class="trips-slider">
                <button class="slider-arrow prev-arrow">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <div class="trips-grid">
                    <!-- Trip cards will be dynamically populated -->
                </div>
                <button class="slider-arrow next-arrow">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </section>

    <!-- Summer Events -->
    <section class="trips-section">
        <div class="container">
            <h2>Summer Events</h2>
            <div class="trips-slider">
                <button class="slider-arrow prev-arrow">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <div class="trips-grid">
                    <!-- Trip cards will be dynamically populated -->
                </div>
                <button class="slider-arrow next-arrow">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </section>

    <!-- Highlighted Events -->
    <section class="trips-section">
        <div class="container">
            <h2>Highlighted Events</h2>
            <p class="section-subtitle">Recommended camps by our Instructors</p>
            <div class="trips-slider">
                <button class="slider-arrow prev-arrow">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <div class="trips-grid">
                    <!-- Trip cards will be dynamically populated -->
                </div>
                <button class="slider-arrow next-arrow">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </section>

    <div id="site-newsletter"></div>
    <div id="site-footer"></div>

    <script type="module" src="assets/js/main.js"></script>
</body>
</html>
